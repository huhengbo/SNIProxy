# 监听地址
listen:
  - ":80"
  - ":443"

# 指标与健康检查（留空则不启用）
# metrics_addr: "127.0.0.1:9100"

# 超时与连接上限（支持 "10s"/"5m" 或整数秒）
# dial_timeout: 10s
# idle_timeout: 5m
# header_timeout: 5s
# max_conns: 10000

# 可选：SOCKS5 前置代理（失败不会静默降级直连）
# socks5:
#   enable: true
#   addr: 127.0.0.1:40000

# 允许所有域名（true 时忽略 rules）
# allow_all_hosts: true

# 转发规则（仅对象格式；host 必填）
rules:
  - host: example.com
  - host: b.example2.com
  # - host: "*.cdn.example.com"
  #   backend: 10.0.0.5
  #   port: 443
  # - host: api.example.com
  #   backend: 127.0.0.1:8443
